<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロボット戦闘ゲーム</title>
<style>
body { margin: 0; background: black; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let bullets = [];
let enemies = [];
let buildings = [];

let score = 0;
let hp = 5;
let gameOver = false;

const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 25,
  speed: 4
};

// キー入力
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// 建物生成
function createBuildings() {
  for (let i = 0; i < 5; i++) {
    buildings.push({
      x: Math.random() * (canvas.width - 100),
      y: Math.random() * (canvas.height - 100),
      w: 80,
      h: 80
    });
  }
}

createBuildings();

// 衝突判定
function hitRect(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.size > b.x &&
         a.y < b.y + b.h &&
         a.y + a.size > b.y;
}

// 弾発射
window.addEventListener("click", e => {
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (e.clientX - player.x) / 10,
    dy: (e.clientY - player.y) / 10,
    size: 6
  });
});

// 敵生成
function spawnEnemy() {
  if (gameOver) return;

  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) { x = Math.random() * canvas.width; y = -20; }
  if (side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
  if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
  if (side === 3) { x = -20; y = Math.random() * canvas.height; }

  const types = ["chase", "run", "hide"];
  const type = types[Math.floor(Math.random() * 3)];

  enemies.push({
    x, y,
    size: 22,
    type
  });
}

setInterval(spawnEnemy, 1000);

// 更新
function update() {
  if (gameOver) return;

  // プレイヤー移動
  let newX = player.x;
  let newY = player.y;

  if (keys["ArrowUp"]) newY -= player.speed;
  if (keys["ArrowDown"]) newY += player.speed;
  if (keys["ArrowLeft"]) newX -= player.speed;
  if (keys["ArrowRight"]) newX += player.speed;

  // 建物に当たらないようにする
  let temp = { x: newX, y: newY, size: player.size };
  let blocked = buildings.some(b => hitRect(temp, b));

  if (!blocked) {
    player.x = newX;
    player.y = newY;
  }

  // 弾更新
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // 敵更新
  enemies.forEach(e => {

    // 追う
    if (e.type === "chase") {
      e.x += (player.x - e.x) * 0.02;
      e.y += (player.y - e.y) * 0.02;
    }

    // 逃げる
    if (e.type === "run") {
      e.x -= (player.x - e.x) * 0.02;
      e.y -= (player.y - e.y) * 0.02;
    }

    // 隠れる
    if (e.type === "hide") {
      let nearest = buildings[0];
      let dist = 99999;

      buildings.forEach(b => {
        let d = Math.hypot(e.x - b.x, e.y - b.y);
        if (d < dist) {
          dist = d;
          nearest = b;
        }
      });

      e.x += (nearest.x - e.x) * 0.02;
      e.y += (nearest.y - e.y) * 0.02;
    }
  });

  // 弾と敵
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (Math.abs(b.x - e.x) < 15 && Math.abs(b.y - e.y) < 15) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score++;
      }
    });
  });

  // 建物で弾を消す
  bullets = bullets.filter(b => {
    return !buildings.some(build =>
      b.x > build.x &&
      b.x < build.x + build.w &&
      b.y > build.y &&
      b.y < build.y + build.h
    );
  });

  // 敵と接触
  enemies.forEach((e, i) => {
    if (Math.abs(e.x - player.x) < 20 && Math.abs(e.y - player.y) < 20) {
      enemies.splice(i, 1);
      hp--;
      if (hp <= 0) gameOver = true;
    }
  });
}

// 描画
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 建物
  ctx.fillStyle = "gray";
  buildings.forEach(b => {
    ctx.fillRect(b.x, b.y, b.w, b.h);
  });

  // プレイヤー
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // 弾
  ctx.fillStyle = "white";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, b.size, b.size);
  });

  // 敵
  enemies.forEach(e => {
    if (e.type === "chase") ctx.fillStyle = "red";
    if (e.type === "run") ctx.fillStyle = "orange";
    if (e.type === "hide") ctx.fillStyle = "purple";
    ctx.fillRect(e.x, e.y, e.size, e.size);
  });

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("SCORE: " + score, 20, 30);
  ctx.fillText("HP: " + hp, 20, 60);

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
