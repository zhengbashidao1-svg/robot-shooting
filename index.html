<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アニメ風ロボット無双</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #05070b;
    touch-action: none;
  }
  canvas {
    display: block;
    background: #05070b;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let score = 0;
let gameOver = false;
let touchX = null;
let touchY = null;
let bullets = [];
let enemyBullets = [];
let enemies = [];
let buildings = [];
let effects = [];
let frameCount = 0;

const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 28,
  speed: 3.3,
  hp: 5,
  invincible: 120,
  crushTimer: 0,
  crushCooldown: 0
};

function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw &&
         ax + aw > bx &&
         ay < by + bh &&
         ay + ah > by;
}

function distance(ax, ay, bx, by) {
  return Math.hypot(bx - ax, by - ay);
}

function normalize(dx, dy) {
  const len = Math.hypot(dx, dy) || 1;
  return { x: dx / len, y: dy / len };
}

function addEffect(x, y, color, size, life) {
  effects.push({ x, y, color, size, life, maxLife: life });
}

function playerHitsBuilding(nx, ny) {
  for (const b of buildings) {
    if (b.hp > 0 && rectHit(nx, ny, player.size, player.size, b.x, b.y, b.w, b.h)) {
      return true;
    }
  }
  return false;
}

function bulletHitsBuilding(bullet) {
  for (const b of buildings) {
    if (b.hp > 0 && rectHit(bullet.x, bullet.y, bullet.size, bullet.size, b.x, b.y, b.w, b.h)) {
      return b;
    }
  }
  return null;
}

function enemyHitsBuildingRect(nx, ny, size) {
  for (const b of buildings) {
    if (b.hp > 0 && rectHit(nx, ny, size, size, b.x, b.y, b.w, b.h)) {
      return true;
    }
  }
  return false;
}

function randomEdgePosition() {
  const side = Math.floor(Math.random() * 4);
  if (side === 0) return { x: Math.random() * canvas.width, y: -30 };
  if (side === 1) return { x: canvas.width + 30, y: Math.random() * canvas.height };
  if (side === 2) return { x: Math.random() * canvas.width, y: canvas.height + 30 };
  return { x: -30, y: Math.random() * canvas.height };
}

function createBuildings() {
  let tries = 0;

  while (buildings.length < 6 && tries < 300) {
    tries++;

    const b = {
      x: 40 + Math.random() * (canvas.width - 170),
      y: 120 + Math.random() * (canvas.height - 280),
      w: 70 + Math.random() * 45,
      h: 70 + Math.random() * 45,
      hp: 6,
      maxHp: 6
    };

    const tooCloseToPlayer =
      Math.abs((b.x + b.w / 2) - player.x) < 150 &&
      Math.abs((b.y + b.h / 2) - player.y) < 150;

    let overlap = false;
    for (const other of buildings) {
      if (rectHit(b.x, b.y, b.w, b.h, other.x, other.y, other.w, other.h)) {
        overlap = true;
        break;
      }
    }

    if (!tooCloseToPlayer && !overlap) {
      buildings.push(b);
    }
  }
}

function spawnEnemy() {
  if (gameOver) return;

  const pos = randomEdgePosition();
  const types = ["chase", "run", "hide"];
  const type = types[Math.floor(Math.random() * types.length)];

  enemies.push({
    x: pos.x,
    y: pos.y,
    size: 22,
    type: type,
    speed: type === "chase" ? 1.5 : type === "run" ? 1.9 : 1.25,
    hp: type === "chase" ? 2 : 1,
    moveTimer: 0,
    dirX: 0,
    dirY: 0,
    shootCooldown: 30 + Math.floor(Math.random() * 40),
    color: type === "chase" ? "#ff3b3b" : type === "run" ? "#ffae00" : "#b000ff"
  });
}

function shootAuto() {
  if (enemies.length === 0 || gameOver) return;

  let nearest = enemies[0];
  let bestDist = Infinity;

  for (const e of enemies) {
    const d = distance(player.x, player.y, e.x, e.y);
    if (d < bestDist) {
      bestDist = d;
      nearest = e;
    }
  }

  const dir = normalize(nearest.x - player.x, nearest.y - player.y);

  bullets.push({
    x: player.x + player.size / 2 - 3,
    y: player.y + player.size / 2 - 3,
    dx: dir.x * 7.5,
    dy: dir.y * 7.5,
    size: 6
  });

  addEffect(player.x + player.size / 2, player.y + player.size / 2, "#88eeff", 14, 8);
}

function enemyShoot(e) {
  const px = player.x + player.size / 2;
  const py = player.y + player.size / 2;
  const ex = e.x + e.size / 2;
  const ey = e.y + e.size / 2;

  const dir = normalize(px - ex, py - ey);

  enemyBullets.push({
    x: ex - 3,
    y: ey - 3,
    dx: dir.x * 3.2,
    dy: dir.y * 3.2,
    size: 6
  });

  addEffect(ex, ey, "#ffd966", 10, 6);
}

function damageBuilding(building, amount) {
  if (!building || building.hp <= 0) return;

  building.hp -= amount;
  addEffect(building.x + building.w / 2, building.y + building.h / 2, "#bbbbbb", 16, 10);

  if (building.hp <= 0) {
    building.hp = 0;
    addEffect(building.x + building.w / 2, building.y + building.h / 2, "#ff4444", 40, 18);
    score += 5;
  }
}

function triggerCrush() {
  if (gameOver) return;
  if (player.crushCooldown > 0) return;

  player.crushTimer = 18;
  player.crushCooldown = 90;

  const crushRadius = 78;
  const px = player.x + player.size / 2;
  const py = player.y + player.size / 2;

  addEffect(px, py, "rgba(255,120,80,0.65)", 78, 16);

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ex = e.x + e.size / 2;
    const ey = e.y + e.size / 2;
    const d = distance(px, py, ex, ey);

    if (d < crushRadius) {
      addEffect(ex, ey, e.color, 20, 10);
      enemies.splice(i, 1);
      score += 15;
    }
  }

  for (const b of buildings) {
    if (b.hp <= 0) continue;
    const bx = b.x + b.w / 2;
    const by = b.y + b.h / 2;
    const d = distance(px, py, bx, by);

    if (d < crushRadius + Math.max(b.w, b.h) * 0.35) {
      damageBuilding(b, 10);
    }
  }
}

function resetGame() {
  score = 0;
  gameOver = false;
  touchX = null;
  touchY = null;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  buildings = [];
  effects = [];
  frameCount = 0;

  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.hp = 5;
  player.invincible = 120;
  player.crushTimer = 0;
  player.crushCooldown = 0;

  createBuildings();
}

canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();

  if (gameOver) {
    resetGame();
    return;
  }

  if (e.touches.length >= 2) {
    triggerCrush();
    return;
  }

  const touch = e.touches[0];
  touchX = touch.clientX;
  touchY = touch.clientY;
}, { passive: false });

canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  if (gameOver) return;

  const touch = e.touches[0];
  touchX = touch.clientX;
  touchY = touch.clientY;
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
  e.preventDefault();

  if (e.touches.length === 0) {
    touchX = null;
    touchY = null;
  }
}, { passive: false });

function updatePlayer() {
  if (touchX !== null && touchY !== null) {
    const centerX = player.x + player.size / 2;
    const centerY = player.y + player.size / 2;
    const dir = normalize(touchX - centerX, touchY - centerY);
    const dist = distance(centerX, centerY, touchX, touchY);

    if (dist > 8) {
      const nx = player.x + dir.x * player.speed;
      const ny = player.y + dir.y * player.speed;

      if (!playerHitsBuilding(nx, player.y)) {
        player.x = nx;
      }
      if (!playerHitsBuilding(player.x, ny)) {
        player.y = ny;
      }
    }
  }

  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

  if (player.invincible > 0) player.invincible--;
  if (player.crushTimer > 0) player.crushTimer--;
  if (player.crushCooldown > 0) player.crushCooldown--;
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.dx;
    b.y += b.dy;

    const hitBuilding = bulletHitsBuilding(b);
    if (hitBuilding) {
      damageBuilding(hitBuilding, 1);
      bullets.splice(i, 1);
      continue;
    }

    if (
      b.x < -20 || b.x > canvas.width + 20 ||
      b.y < -20 || b.y > canvas.height + 20
    ) {
      bullets.splice(i, 1);
    }
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.dx;
    b.y += b.dy;

    const hitBuilding = bulletHitsBuilding(b);
    if (hitBuilding) {
      enemyBullets.splice(i, 1);
      continue;
    }

    if (rectHit(b.x, b.y, b.size, b.size, player.x, player.y, player.size, player.size)) {
      if (player.invincible <= 0) {
        player.hp--;
        player.invincible = 60;
        addEffect(player.x + player.size / 2, player.y + player.size / 2, "#fff5aa", 16, 10);

        if (player.hp <= 0) {
          player.hp = 0;
          gameOver = true;
        }
      }
      enemyBullets.splice(i, 1);
      continue;
    }

    if (
      b.x < -20 || b.x > canvas.width + 20 ||
      b.y < -20 || b.y > canvas.height + 20
    ) {
      enemyBullets.splice(i, 1);
    }
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    const px = player.x + player.size / 2;
    const py = player.y + player.size / 2;
    const ex = e.x + e.size / 2;
    const ey = e.y + e.size / 2;
    const dist = distance(ex, ey, px, py);

    let moveX = 0;
    let moveY = 0;

    if (e.type === "chase") {
      const dir = normalize(px - ex, py - ey);
      moveX = dir.x * e.speed;
      moveY = dir.y * e.speed;
    } else if (e.type === "run") {
      if (dist < 180) {
        const dir = normalize(ex - px, ey - py);
        moveX = dir.x * e.speed;
        moveY = dir.y * e.speed;
      } else {
        e.moveTimer--;
        if (e.moveTimer <= 0) {
          e.moveTimer = 20 + Math.floor(Math.random() * 40);
          const angle = Math.random() * Math.PI * 2;
          e.dirX = Math.cos(angle);
          e.dirY = Math.sin(angle);
        }
        moveX = e.dirX * 1.1;
        moveY = e.dirY * 1.1;
      }
    } else if (e.type === "hide") {
      let nearestBuilding = null;
      let bestDist = Infinity;

      for (const b of buildings) {
        if (b.hp <= 0) continue;
        const bx = b.x + b.w / 2;
        const by = b.y + b.h / 2;
        const bd = distance(ex, ey, bx, by);
        if (bd < bestDist) {
          bestDist = bd;
          nearestBuilding = b;
        }
      }

      if (nearestBuilding) {
        const bx = nearestBuilding.x + nearestBuilding.w / 2;
        const by = nearestBuilding.y + nearestBuilding.h / 2;

        if (dist < 110) {
          const dir = normalize(ex - px, ey - py);
          moveX = dir.x * e.speed;
          moveY = dir.y * e.speed;
        } else {
          const dir = normalize(bx - ex, by - ey);
          moveX = dir.x * e.speed * 0.9;
          moveY = dir.y * e.speed * 0.9;
        }
      } else {
        const dir = normalize(px - ex, py - ey);
        moveX = dir.x * 0.7;
        moveY = dir.y * 0.7;
      }
    }

    const nx = e.x + moveX;
    const ny = e.y + moveY;

    if (!enemyHitsBuildingRect(nx, e.y, e.size)) e.x = nx;
    if (!enemyHitsBuildingRect(e.x, ny, e.size)) e.y = ny;

    e.shootCooldown--;
    if (e.shootCooldown <= 0) {
      const canShoot =
        (e.type === "chase" && dist < 260) ||
        (e.type === "run" && dist < 180) ||
        (e.type === "hide" && dist < 300);

      if (canShoot) {
        enemyShoot(e);
      }

      e.shootCooldown = e.type === "chase" ? 70 : e.type === "run" ? 110 : 80;
    }

    if (rectHit(e.x, e.y, e.size, e.size, player.x, player.y, player.size, player.size)) {
      if (player.invincible <= 0) {
        player.hp--;
        player.invincible = 60;
        addEffect(player.x + player.size / 2, player.y + player.size / 2, "#ffffff", 18, 10);

        if (player.hp <= 0) {
          player.hp = 0;
          gameOver = true;
        }
      }
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (rectHit(b.x, b.y, b.size, b.size, e.x, e.y, e.size, e.size)) {
        e.hp--;
        bullets.splice(j, 1);
        addEffect(e.x + e.size / 2, e.y + e.size / 2, e.color, 12, 8);

        if (e.hp <= 0) {
          enemies.splice(i, 1);
          score += 10;
        }
        break;
      }
    }
  }
}

function updateEffects() {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].life--;
    if (effects[i].life <= 0) {
      effects.splice(i, 1);
    }
  }
}

function update() {
  if (!gameOver) {
    frameCount++;
    updatePlayer();
    updateBullets();
    updateEnemyBullets();
    updateEnemies();
    updateEffects();

    if (frameCount % 16 === 0) shootAuto();
    if (frameCount % 52 === 0) spawnEnemy();
  } else {
    updateEffects();
  }
}

function drawBackground() {
  ctx.fillStyle = "#05070b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawBuildings() {
  for (const b of buildings) {
    if (b.hp <= 0) {
      ctx.fillStyle = "#aa2222";
      ctx.fillRect(b.x, b.y, b.w, b.h);
      continue;
    }

    ctx.fillStyle = "#7d7d7d";
    ctx.fillRect(b.x, b.y, b.w, b.h);

    ctx.fillStyle = "#5e5e5e";
    ctx.fillRect(b.x + 6, b.y + 6, b.w - 12, b.h - 12);

    ctx.fillStyle = "#9a9a9a";
    for (let wx = b.x + 12; wx < b.x + b.w - 10; wx += 18) {
      for (let wy = b.y + 12; wy < b.y + b.h - 10; wy += 18) {
        ctx.fillRect(wx, wy, 6, 8);
      }
    }

    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(b.x, b.y - 8, b.w, 5);
    ctx.fillStyle = "#66ff66";
    ctx.fillRect(b.x, b.y - 8, b.w * (b.hp / b.maxHp), 5);
  }
}

function drawPlayer() {
  const x = player.x;
  const y = player.y;
  const s = player.size;

  if (player.crushTimer > 0) {
    ctx.beginPath();
    ctx.arc(x + s / 2, y + s / 2, 78, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,120,80,0.18)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,180,120,0.8)";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.fillRect(x + 4, y + 5, s, s);

  if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
    ctx.fillStyle = "#7ffcff";
  } else {
    ctx.fillStyle = "#00e5ff";
  }

  ctx.fillRect(x + 5, y, s - 10, 10);
  ctx.fillRect(x, y + 8, s, s - 10);

  ctx.fillStyle = "#00b7cf";
  ctx.fillRect(x + 4, y + 12, s - 8, s - 18);

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(x + 8, y + 2, 4, 3);
  ctx.fillRect(x + s - 12, y + 2, 4, 3);

  ctx.fillStyle = "#d7ffff";
  ctx.fillRect(x + s - 1, y + 12, 7, 4);

  ctx.fillStyle = "#0aa8b6";
  ctx.fillRect(x + 4, y + s - 4, 5, 6);
  ctx.fillRect(x + s - 9, y + s - 4, 5, 6);
}

function drawBullets() {
  for (const b of bullets) {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(b.x, b.y, b.size, b.size);

    ctx.fillStyle = "rgba(150,255,255,0.35)";
    ctx.fillRect(b.x - 2, b.y - 2, b.size + 4, b.size + 4);
  }
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    ctx.fillStyle = "#ffd84d";
    ctx.fillRect(b.x, b.y, b.size, b.size);

    ctx.fillStyle = "rgba(255,216,77,0.25)";
    ctx.fillRect(b.x - 2, b.y - 2, b.size + 4, b.size + 4);
  }
}

function drawEnemyBody(e) {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(e.x + 3, e.y + 3, e.size, e.size);

  ctx.fillStyle = e.color;
  ctx.fillRect(e.x + 3, e.y, e.size - 6, e.size);

  if (e.type === "chase") {
    ctx.fillRect(e.x, e.y + 5, e.size, e.size - 10);
    ctx.fillStyle = "#ffd2d2";
    ctx.fillRect(e.x + 6, e.y + 6, 3, 3);
    ctx.fillRect(e.x + e.size - 9, e.y + 6, 3, 3);
  }

  if (e.type === "run") {
    ctx.fillRect(e.x + 2, e.y + 4, e.size - 4, e.size - 8);
    ctx.fillStyle = "#fff0c2";
    ctx.fillRect(e.x + 5, e.y + 5, 3, 3);
    ctx.fillRect(e.x + e.size - 8, e.y + 5, 3, 3);
  }

  if (e.type === "hide") {
    ctx.fillRect(e.x + 1, e.y + 3, e.size - 2, e.size - 6);
    ctx.fillStyle = "#f2c8ff";
    ctx.fillRect(e.x + 5, e.y + 7, 3, 3);
    ctx.fillRect(e.x + e.size - 8, e.y + 7, 3, 3);
  }
}

function drawEnemies() {
  for (const e of enemies) {
    drawEnemyBody(e);
  }
}

function drawEffects() {
  for (const ef of effects) {
    const alpha = ef.life / ef.maxLife;
    ctx.beginPath();
    ctx.arc(ef.x, ef.y, ef.size * (1 + (1 - alpha) * 0.4), 0, Math.PI * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ef.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawUI() {
  ctx.fillStyle = "white";
  ctx.font = "bold 20px Arial";
  ctx.fillText("SCORE: " + score, 20, 35);
  ctx.fillText("HP: " + player.hp, 20, 65);

  ctx.font = "14px Arial";
  ctx.fillStyle = "#d7d7d7";
  ctx.fillText("赤=迫る  橙=逃げる  紫=隠れる", 20, 90);
  ctx.fillText("指で移動 / 自動で射撃", 20, 110);
  ctx.fillText("2本指タップ=踏み潰し", 20, 130);
  ctx.fillText("建物も壊せる", 20, 150);

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.58)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 130, canvas.height / 2);

    ctx.font = "20px Arial";
    ctx.fillText("画面タップで再開", canvas.width / 2 - 75, canvas.height / 2 + 38);
  }
}

function draw() {
  drawBackground();
  drawBuildings();
  drawPlayer();
  drawBullets();
  drawEnemyBullets();
  drawEnemies();
  drawEffects();
  drawUI();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();
</script>
</body>
</html>
